<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tHoy 3D</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html,body{
      width:100%;
      height:100%;
      overflow:hidden;
      background:transparent;
    }

    model-viewer{
      width:100vw;
      height:100vh;
      background:transparent;
    }
  </style>

</head>
<body>

<model-viewer
src="base.glb"
camera-controls
auto-rotate
shadow-intensity="1"
environment-image="neutral"
exposure="1.2">
</model-viewer>

</body>
</html>
